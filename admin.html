<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Kontor Oversikt - Miljøbag</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-container { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 1200px; 
            margin: auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Status-farger */
        .status-hentet { color: #28a745; font-weight: bold; }
        .status-venter { color: #dc3545; font-weight: bold; }
        .hentet-rad { background-color: #f0f0f0 !important; opacity: 0.8; }

        .bilde-knapp { 
            cursor: pointer; 
            background: #eee; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            padding: 4px 8px; 
            font-size: 12px; 
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Kontor-oversikt</h1>
            <a href="driver.html" style="text-decoration: none; color: #007bff; font-weight: bold;">➡️ Sjåfør-visning</a>
        </div>
        
        <div id="loading">Henter data...</div>
        <table id="admin-tabell" style="display:none;">
            <thead>
                <tr>
                    <th>Dato</th>
                    <th>Kunde</th>
                    <th>Adresse</th>
                    <th>Bestilling</th>
                    <th>Bilde / Melding</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabell-body"></tbody>
        </table>
    </div>

    <script>
    let passordFraBruker = sessionStorage.getItem('admin_passord');

    if (!passordFraBruker) {
        passordFraBruker = prompt("Passord for kontortilgang:");
        if (passordFraBruker) sessionStorage.setItem('admin_passord', passordFraBruker);
    }

    if (passordFraBruker) {
        hentData();
    }

    async function hentData() {
        try {
            const respons = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
                headers: { 'x-auth-key': passordFraBruker }
            });

            if (!respons.ok) throw new Error("Feil tilgang");

            const data = await respons.json();
            
            // Sorter etter dato (nyeste øverst for kontoret)
            data.sort((a, b) => new Date(b.dato) - new Date(a.dato));

            const tbody = document.getElementById('tabell-body');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('admin-tabell').style.display = 'table';
            tbody.innerHTML = "";

            data.forEach(b => {
                const dato = new Date(b.dato).toLocaleDateString('no-NO');
                const erHentet = b.hentet === true;
                
                const statusTekst = erHentet ? 
                    '<span class="status-hentet">✅ Hentet</span>' : 
                    '<span class="status-venter">⏳ Venter</span>';

                const radStil = erHentet ? 'class="hentet-rad"' : '';

                const rad = `
                    <tr ${radStil}>
                        <td>${dato}</td>
                        <td>
                            <strong>${b.firmaNavn || b.kontaktperson}</strong><br>
                            <small>${b.telefon}</small>
                        </td>
                        <td>${b.adresse}, ${b.postnummer} ${b.poststed}</td>
                        <td>${b.antallSmall}S / ${b.antallMedium}M / ${b.antallLarge}L</td>
                        <td>
                            ${b.bilde ? `<button class="bilde-knapp" onclick="visBilde('${b.bilde}')">🖼️ Se bilde</button>` : ''}
                            <div style="font-size: 11px; color: #666; margin-top: 5px;">${b.melding || '-'}</div>
                        </td>
                        <td>${statusTekst}</td>
                    </tr>`;
                tbody.innerHTML += rad;
            });

        } catch (err) {
            document.getElementById('loading').innerText = "Kunne ikke hente data. Sjekk passord.";
        }
    }

    function visBilde(base64Data) {
        const win = window.open("");
        win.document.write(`<img src="${base64Data}" style="max-width:100%;">`);
    }

    // Auto-oppdater hvert 5. minutt for å se sjåførens fremdrift
    setInterval(hentData, 300000);
    </script>
</body>
</html>
