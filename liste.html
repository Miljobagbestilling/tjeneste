<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Bestillingsoversikt - Miljøbag</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-container { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 1200px; 
            margin: auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #28a745; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-knapp { background: #ffc107; border: none; padding: 8px 12px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        td { vertical-align: top; line-height: 1.4; }
        small { color: #555; display: inline-block; margin-top: 4px; }
        strong { color: #333; }
        .hentet-rad { background-color: #e9ecef !important; color: #6c757d; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Bestillinger for Miljøbag</h1>
        <div id="loading">Henter bestillinger...</div>
        <table id="bestilling-tabell" style="display:none;">
            <thead>
                <tr>
                    <th>Dato</th>
                    <th>Kunde & Faktura-info</th>
                    <th>Adresse & Sted</th>
                    <th>Bestilling (S/M/L)</th>
                    <th>Melding / Kanal</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabell-body"></tbody>
        </table>
    </div>

    <script>
    // Spør om passord med en gang siden åpnes
    const passordFraBruker = prompt("Skriv inn passord for tilgang:");

    // Vi sjekker ikke passordet her, vi bare prøver å hente data
    if (passordFraBruker) {
        hentBestillinger(passordFraBruker);
    } else {
        document.body.innerHTML = "<h1 style='text-align:center;'>Tilgang nektet</h1>";
    }

    async function hentBestillinger(nøkkel) {
        try {
            const respons = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
                headers: {
                    // Vi sender passordet brukeren skrev inn som x-auth-key
                    'x-auth-key': nøkkel 
                }
            });

            // Hvis serveren sier nei (feil passord), stopper vi her
            if (!respons.ok) {
                alert("Feil passord. Prøv på nytt.");
                location.reload(); 
                return;
            }

            const data = await respons.json();
            
            // --- Her fortsetter sorteringen og utfyllingen av tabellen din som før ---
            data.sort((a, b) => (a.postnummer || "").localeCompare(b.postnummer || ""));
            
            const tbody = document.getElementById('tabell-body');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('bestilling-tabell').style.display = 'table';
            tbody.innerHTML = "";

            data.forEach(b => {
                // ... din eksisterende logikk for å tegne rader ...
            });
            
        } catch (err) {
            console.error(err);
            document.getElementById('loading').innerText = 'Kunne ikke koble til serveren.';
        }
    }

    // Husk å oppdatere markerSomHentet-funksjonen din også slik at den sender passordet!
    async function markerSomHentet(id) {
        try {
            await fetch(`https://miljobag-backend.onrender.com/api/bestilling/${id}/status`, {
                method: 'PATCH',
                headers: {
                    'x-auth-key': passordFraBruker // Bruker passordet vi lagret i sted
                }
            });
            location.reload();
        } catch (err) {
            alert('Kunne ikke oppdatere.');
        }
    }
</script>
</body>
</html>
