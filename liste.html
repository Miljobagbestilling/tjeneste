<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Bestillingsoversikt - Miljøbag</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-container { 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    max-width: 1200px; /* Økt fra 900px */
    margin: auto; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #28a745; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-knapp { background: #ffc107; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        td { vertical-align: top; line-height: 1.4; }
small { color: #555; display: inline-block; margin-top: 4px; }
strong { color: #333; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Bestillinger for Miljøbag</h1>
        <div id="loading">Henter bestillinger...</div>
        <table id="bestilling-tabell" style="display:none;">
            <thead>
    <tr>
        <th>Dato</th>
        <th>Kunde & Faktura-info</th>
        <th>Adresse & Sted</th>
        <th>Bestilling (S/M/L)</th>
        <th>Melding / Kanal</th>
        <th>Status</th>
    </tr>
</thead>
            <tbody id="tabell-body"></tbody>
        </table>
    </div>

    <script>
    const passordInput = prompt("Skriv inn passord for tilgang:");
    const RIKTIG_PASSORD = "miljobag2024";

    if (passordInput !== RIKTIG_PASSORD) {
        alert("Feil passord. Tilgang nektet.");
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>Ingen tilgang.</h1>";
    } else {
        hentBestillinger();
    }

    async function hentBestillinger() {
        try {
            const respons = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
            headers: {
            'x-auth-key': 'f98vudsu+9ad'
            }
    });
            
            // Sorter etter postnummer
            data.sort((a, b) => (a.postnummer || "").localeCompare(b.postnummer || ""));

            const tbody = document.getElementById('tabell-body');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('bestilling-tabell').style.display = 'table';

            data.forEach(b => {
                const dato = new Date(b.dato).toLocaleDateString('no-NO');
                const adresseFull = `${b.adresse}, ${b.postnummer} ${b.poststed}`;
                
                // FIKSET: Bruker riktig format for kart-lenke
                const kartURL = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adresseFull)}`;
                
                const erHentet = b.hentet === true;
                const stil = erHentet ? 'style="background-color: #e9ecef; color: #6c757d;"' : '';
                const kanalStatus = b.fraQR ? '📱 QR' : '💻 Web';

                const kundeInfo = `
                    <strong>${b.firmaNavn || b.navn}</strong><br>
                    <small>
                        ${b.epost}<br>
                        Org: ${b.orgNr || 'Privat'}<br>
                        Tlf: ${b.telefon}
                    </small>
                `;

                const bagDetaljer = `${b.antallSmall || 0}S / ${b.antallMedium || 0}M / ${b.antallLarge || 0}L`;
                const knappTekst = erHentet ? '↩️ Angre' : 'Marker hentet';
                const knappKlasse = erHentet ? 'style="background: #6c757d; color: white;"' : '';

                // FIKSET: Alt innhold er nå inne i <td>-tagger
                const rad = `<tr ${stil}>
                    <td>${dato}</td>
                    <td>
                        ${kundeInfo}<br>
                        <a href="tel:${b.telefon}" style="display: inline-block; margin-top: 5px; padding: 5px; background: #eee; border-radius: 5px; text-decoration: none; color: black; font-size: 12px;">📞 Ring</a>
                    </td>
                    <td>
                        <a href="${kartURL}" target="_blank" style="text-decoration: none; color: #007bff;">📍 ${adresseFull}</a>
                    </td>
                    <td><strong>${bagDetaljer}</strong></td>
                    <td><small>${b.melding || '-'}</small><br><strong>${kanalStatus}</strong></td>
                    <td>
                        <button class="status-knapp" ${knappKlasse} onclick="markerSomHentet('${b._id}')">
                            ${knappTekst}
                        </button>
                    </td>
                </tr>`;
                tbody.innerHTML += rad;
            });
            
        } catch (err) {
            console.error(err);
            document.getElementById('loading').innerText = 'Feil ved henting av data. Sjekk konsollen.';
        }
    }

    async function markerSomHentet(id) {
        try {
            const response = await fetch(`https://miljobag-backend.onrender.com/marker-hentet/${id}`, {
                method: 'PATCH'
            });
            if (response.ok) { location.reload(); }
        } catch (err) {
            alert('Kunne ikke koble til serveren.');
        }
    }
</script>
</body>
</html>
