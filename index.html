<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miljøbag - Bestill Henting</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; line-height: 1.6; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; }
        .pris-tabell { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .pris-tabell th, .pris-tabell td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .original-pris { text-decoration: line-through; color: #888; font-size: 0.9em; margin-right: 5px; }
        .rabatt-pris { color: #28a745; font-weight: bold; }
        .rabatt-notis { color: #28a745; font-weight: bold; display: none; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        input, textarea { width: 100%; margin: 5px 0; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>

    <link rel="manifest" href="manifest-index.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="logo.png">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    <script>
        if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</head>
<body>

<div class="container">
    <img src="logo.png" alt="Miljøbag Logo" style="display: block; max-width: 200px; margin: 0 auto 20px auto;">
    
    <h3>Priser for henting</h3>
    <table class="pris-tabell">
        <thead>
            <tr>
                <th>Antall bagger</th>
                <th>Pris per stk</th>
            </tr>
        </thead>
        <tbody id="pris-liste"></tbody>
    </table>

    <p id="rabatt-notis" class="rabatt-notis">🎁 QR-rabatt aktivert!</p>

    <form id="bestillingsSkjema">
        <input type="text" id="firmaNavn" placeholder="Firmanavn / Navn" required>
        <input type="text" id="kontaktperson" placeholder="Navn på kontaktperson" required>
        <input type="text" id="orgNr" placeholder="Organisasjonsnummer">
        
        <input type="tel" id="telefon" placeholder="Deres telefonnummer" required>
        <input type="email" id="epost" placeholder="Deres e-postadresse" required>
        
        <input type="text" id="adresse" placeholder="Adresse for henting" required>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="postnummer" name="postnummer" placeholder="Postnr" style="flex: 1;" required>
            <input type="text" id="poststed" name="poststed" placeholder="Poststed" style="flex: 2;" required>
        </div>

        <label style="display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; margin-bottom: 5px;">Antall bagger som skal hentes:</label>

        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div style="flex: 1; text-align: center;">
                <label for="antallSmall" style="font-size: 0.8em; color: #666;">Small</label>
                <input type="number" id="antallSmall" min="0" value="0" style="text-align: center; margin-top: 5px;">
            </div>
            
            <div style="flex: 1; text-align: center;">
                <label for="antallMedium" style="font-size: 0.8em; color: #666;">Medium</label>
                <input type="number" id="antallMedium" min="0" value="0" style="text-align: center; margin-top: 5px;">
            </div>
            
            <div style="flex: 1; text-align: center;">
                <label for="antallLarge" style="font-size: 0.8em; color: #666;">Large</label>
                <input type="number" id="antallLarge" min="0" value="0" style="text-align: center; margin-top: 5px;">
            </div>
        </div>
        
          
        <div style="margin-bottom: 20px; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; background: #fafafa;">
        <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;">Valgfritt: Vis oss hvor baggen står og hva den inneholder</label>
    
        <input type="file" id="bilde" accept="image/*" style="display: none;" onchange="visFilnavn(this)">
    
                <div style="margin-bottom: 20px; padding: 15px; border: 1px dashed #ccc; border-radius: 8px; background: #fafafa;">
        <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;">Valgfritt: Vis oss hvor baggen står (velg gjerne flere)</label>
    
        <input type="file" id="bilde" accept="image/*" multiple style="display: none;" onchange="visFilnavn(this)">
    
        <div style="display: flex; align-items: center; gap: 10px;">
        <button type="button" onclick="document.getElementById('bilde').click()" 
            style="padding: 8px 12px; background: #e9ecef; color: #495057; border: 1px solid #ced4da; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600;">
            📷 Last opp bilder
        </button>
        <span id="fil-valgt" style="font-size: 12px; color: #666;">Ingen filer valgt</span>
        </div>
        </div>

        <textarea id="melding" rows="4" placeholder="Beskrivelse av hentested eller annen nyttig informasjon"></textarea>
        
        <button type="submit" id="bestillKnapp">Bestill henting</button>
    </form>
</div>

<script>
    // Funksjon for å gjøre bilde om til tekst (Base64)
    const lesBilde = (file) => {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
        });
    };

    function visFilnavn(input) {
    const status = document.getElementById('fil-valgt');
    const antall = input.files.length;
    
    if (antall > 0) {
        status.innerText = `✅ ${antall} bilde(r) er valgt`;
        status.style.color = "#28a745";
    } else {
        status.innerText = "Ingen filer valgt";
        status.style.color = "#666";
    }
}

    // 1. Vekker serveren umiddelbart
    fetch('https://miljobag-backend.onrender.com/ping').catch(e => console.log("Vekker server..."));

    // Automatisk utfylling av poststed
    document.getElementById('postnummer').addEventListener('input', async (e) => {
        const pnr = e.target.value.trim();
        if (pnr.length === 4 && !isNaN(pnr)) {
            try {
                const response = await fetch(`https://api.zippopotam.us/no/${pnr}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('poststed').value = data.places[0]['place name'];
                }
            } catch (err) {
                console.error("Kunne ikke hente poststed", err);
            }
        }
    });

    // Sjekk kilde (QR)
    const urlParams = new URLSearchParams(window.location.search);
    const erFraQR = urlParams.get('kilde') === 'qr';
    const prisListeElement = document.getElementById('pris-liste');
    const rabattNotis = document.getElementById('rabatt-notis');

    const standardPris = 590;
    const qrRabatt = 100;

    if (erFraQR) {
        rabattNotis.style.display = 'block';
        prisListeElement.innerHTML = `
            <tr><td>1 - 3 bagger</td><td><span class="original-pris">${standardPris},-</span><span class="rabatt-pris">${standardPris - qrRabatt},-</span></td></tr>
            <tr><td>4+ bagger</td><td><span class="original-pris">490,-</span><span class="rabatt-pris">390,-</span></td></tr>
        `;
    } else {
        prisListeElement.innerHTML = `
            <tr><td>1 - 3 bagger</td><td>${standardPris},-</td></tr>
            <tr><td>4+ bagger</td><td>490,-</td></tr>
        `;
    }

    // Innsending av skjema
    document.getElementById('bestillingsSkjema').addEventListener('submit', async (e) => {
        e.preventDefault();

        const knapp = document.getElementById('bestillKnapp');
        knapp.innerText = "Sender bestilling... Vennligst vent";
        knapp.disabled = true;

        const bildeFil = document.getElementById('bilde').files[0];
        let bildeData = "";
        if (bildeFil) {
            bildeData = await lesBilde(bildeFil);
        }

        const data = {
    firmaNavn: document.getElementById('firmaNavn').value,
    kontaktperson: document.getElementById('kontaktperson').value,
    orgNr: document.getElementById('orgNr').value,
    telefon: document.getElementById('telefon').value,
    epost: document.getElementById('epost').value,
    adresse: document.getElementById('adresse').value,
    postnummer: document.getElementById('postnummer').value,
    poststed: document.getElementById('poststed').value,
    antallSmall: document.getElementById('antallSmall').value,
    antallMedium: document.getElementById('antallMedium').value,
    antallLarge: document.getElementById('antallLarge').value,
    melding: document.getElementById('melding').value,
    fraQR: erFraQR,
    bilde: bildeData  
};

        try {
            const respons = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (respons.ok) {
                alert('Takk! Vi har mottatt din bestilling.');
                document.getElementById('bestillingsSkjema').reset();
            } else {
                alert('Noe gikk galt på serveren.');
            }
        } catch (feil) {
            alert('Kunne ikke koble til serveren.');
        } finally {
            knapp.disabled = false;
            knapp.innerText = "Bestill henting";
        }
    });
</script>
</body>
</html>
