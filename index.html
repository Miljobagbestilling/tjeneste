<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miljøbag - Bestill Henting</title>
    
    <link rel="manifest" href="manifest_admin.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#28a745">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="apple-touch-startup-image" href="logo.png">

    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; line-height: 1.6; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Laste-skjerm stil */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .pris-tabell { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .pris-tabell th, .pris-tabell td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        .original-pris { text-decoration: line-through; color: #888; font-size: 0.9em; margin-right: 5px; }
        .rabatt-pris { color: #28a745; font-weight: bold; }
        .rabatt-notis { color: #28a745; font-weight: bold; display: none; background: #e8f5e9; padding: 10px; border-radius: 5px; }
        
        input, textarea { width: 100%; margin: 5px 0; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #adresse-forslag { 
            position: absolute; 
            width: 100%; 
            background: white; 
            border: 1px solid #ccc; 
            z-index: 9999; 
            display: none; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            max-height: 200px;
            overflow-y: auto;
        }
        #adresse-forslag div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <img src="logo.png" alt="Laster..." style="width: 180px; margin-bottom: 20px;">
    <p style="color: #666; font-weight: bold;">Laster Miljøbag...</p>
</div>

<div class="container">
    <img src="logo.png" alt="Miljøbag Logo" style="display: block; max-width: 200px; margin: 0 auto 20px auto;">
    
    <h3>Priser for henting</h3>
    <table class="pris-tabell">
        <thead>
            <tr>
                <th>Antall bagger</th>
                <th>Pris per stk</th>
            </tr>
        </thead>
        <tbody id="pris-liste"></tbody>
    </table>

    <p id="rabatt-notis" class="rabatt-notis">🎁 QR-rabatt aktivert!</p>

    <form id="bestillingsSkjema">
        <input type="text" id="firmaNavn" placeholder="Firmanavn / Navn" required>
        <input type="text" id="kontaktperson" placeholder="Navn på kontaktperson" required>
        <input type="text" id="orgNr" placeholder="Organisasjonsnummer">
        
        <input type="tel" id="telefon" placeholder="Deres telefonnummer" required>
        <input type="email" id="epost" placeholder="Deres e-postadresse" required>
        
        <div style="position: relative; margin-bottom: 10px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em;">Adresse for henting:</label>
            <input type="text" id="adresse" placeholder="Søk på din adresse..." autocomplete="off" required>
            <div id="adresse-forslag"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <input type="text" id="postnummer" placeholder="Postnr" style="flex: 1;" required>
            <input type="text" id="poststed" placeholder="Poststed" style="flex: 2;" required>
        </div>

        <label style="display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em;">Antall bagger:</label>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div style="flex: 1; text-align: center;">
                <label style="font-size: 0.7em;">Small</label>
                <input type="number" id="antallSmall" min="0" value="0">
            </div>
            <div style="flex: 1; text-align: center;">
                <label style="font-size: 0.7em;">Medium</label>
                <input type="number" id="antallMedium" min="0" value="0">
            </div>
            <div style="flex: 1; text-align: center;">
                <label style="font-size: 0.7em;">Large</label>
                <input type="number" id="antallLarge" min="0" value="0">
            </div>
        </div>
        
        <div style="margin-bottom: 20px; padding: 15px; border: 1px dashed #ccc; background: #fafafa;">
            <input type="file" id="bilde" accept="image/*" style="display: none;" onchange="visFilnavn(this)">
            <button type="button" onclick="document.getElementById('bilde').click()" style="padding: 8px; font-size: 14px; background: #e9ecef; color: #333; width: auto;">📷 Last opp bilde</button>
            <span id="fil-valgt" style="font-size: 12px; margin-left: 10px;">Valgfritt</span>
        </div>

        <textarea id="melding" rows="3" placeholder="Beskrivelse av hentested..."></textarea>
        <button type="submit" id="bestillKnapp">Bestill henting</button>
    </form>
</div>

<script>
    // Skjul laste-skjermen når ALT er ferdig (bilder, scripts, etc)
    window.addEventListener('load', () => {
        const loader = document.getElementById('loading-overlay');
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    });

    const adresseInput = document.getElementById('adresse');
    const forslagBox = document.getElementById('adresse-forslag');

    // Adresse-søk logikk
    adresseInput.addEventListener('input', async (e) => {
        const sok = e.target.value.trim();
        if (sok.length < 4) { forslagBox.style.display = 'none'; return; }

        try {
            const url = `https://corsproxy.io/?${encodeURIComponent('https://ws.geonorge.no/adresser/v1/sok?sok=' + sok + '&treffPerSide=5&fuzzy=true')}`;
            const respons = await fetch(url);
            const data = await respons.json();

            if (data.adresser && data.adresser.length > 0) {
                forslagBox.innerHTML = '';
                forslagBox.style.display = 'block';
                data.adresser.forEach(adr => {
                    const div = document.createElement('div');
                    div.innerText = `${adr.adressetekst}, ${adr.postnummer} ${adr.poststed}`;
                    div.onclick = () => {
                        adresseInput.value = adr.adressetekst;
                        document.getElementById('postnummer').value = adr.postnummer;
                        document.getElementById('poststed').value = adr.poststed;
                        forslagBox.style.display = 'none';
                    };
                    forslagBox.appendChild(div);
                });
            }
        } catch (err) { console.error("Søkefeil:", err); }
    });

    // Prislogikk og innsending (samme som før)
    const urlParams = new URLSearchParams(window.location.search);
    const erFraQR = urlParams.get('kilde') === 'qr';
    const prisListeElement = document.getElementById('pris-liste');
    if (erFraQR) {
        document.getElementById('rabatt-notis').style.display = 'block';
        prisListeElement.innerHTML = `<tr><td>1-3stk</td><td><span class="original-pris">590,-</span><span class="rabatt-pris">490,-</span></td></tr><tr><td>4+stk</td><td><span class="original-pris">490,-</span><span class="rabatt-pris">390,-</span></td></tr>`;
    } else {
        prisListeElement.innerHTML = `<tr><td>1-3stk</td><td>590,-</td></tr><tr><td>4+stk</td><td>490,-</td></tr>`;
    }

    function visFilnavn(input) {
        document.getElementById('fil-valgt').innerText = input.files.length > 0 ? "✅ Bilde valgt" : "Valgfritt";
    }

    document.getElementById('bestillingsSkjema').addEventListener('submit', async (e) => {
        e.preventDefault();
        const knapp = document.getElementById('bestillKnapp');
        knapp.innerText = "Sender..."; knapp.disabled = true;

        const data = {
            firmaNavn: document.getElementById('firmaNavn').value,
            adresse: adresseInput.value,
            postnummer: document.getElementById('postnummer').value,
            poststed: document.getElementById('poststed').value,
            antallSmall: document.getElementById('antallSmall').value,
            antallMedium: document.getElementById('antallMedium').value,
            antallLarge: document.getElementById('antallLarge').value,
            epost: document.getElementById('epost').value,
            telefon: document.getElementById('telefon').value,
            melding: document.getElementById('melding').value,
            fraQR: erFraQR
        };

        try {
            const res = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) { alert('Bestilling mottatt!'); document.getElementById('bestillingsSkjema').reset(); }
        } catch (f) { alert('Feil ved sending.'); }
        knapp.innerText = "Bestill henting"; knapp.disabled = false;
    });

    // Vekker serveren
    fetch('https://miljobag-backend.onrender.com/ping').catch(() => {});
</script>

</body>
</html>
