<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Sjåfør Visning - Miljøbag</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-container { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 1200px; 
            margin: auto; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #343a40; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .hentet-rad { background-color: #f0f0f0 !important; opacity: 0.6; }
        
        .rute-hovedknapp {
            width: 100%; padding: 15px; background: #007bff; color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-bottom: 20px;
        }
        .rute-hovedknapp:hover { background: #0056b3; }
        
        .status-knapp { 
            padding: 8px 12px; border: none; border-radius: 4px; 
            font-weight: bold; cursor: pointer; font-size: 13px;
        }
        .ring-knapp {
            display: inline-block; padding: 6px 10px; background: #28a745; 
            color: white; text-decoration: none; border-radius: 4px; font-size: 11px;
        }
        .bilde-knapp { 
            cursor: pointer; background: #eee; border: 1px solid #ccc; 
            border-radius: 4px; padding: 4px 8px; font-size: 12px; 
        }
        a.kart-lenke { color: #007bff; text-decoration: none; font-weight: bold; }
        .kilde-tag { font-size: 10px; padding: 2px 5px; border-radius: 3px; background: #e9ecef; color: #495057; font-weight: bold; }
    </style>

    <link rel="manifest" href="manifest.json?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="logo.png">



<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</head>
<body>
    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1>Sjåfør-liste</h1>
            <a href="admin.html" style="text-decoration: none; color: #666; font-size: 14px;">⬅️ Tilbake til kontor</a>
        </div>

        <button onclick="lagKjørerute()" class="rute-hovedknapp">🗺️ Lag kjørerute (neste 10 stopp)</button>
        
        <div id="loading">Henter kjøreliste...</div>
        <table id="driver-tabell" style="display:none;">
            <thead>
                <tr>
                    <th>Kunde</th>
                    <th>Adresse (Kart)</th>
                    <th>Bagger</th>
                    <th>Info / Kilde</th>
                    <th>Handling</th>
                </tr>
            </thead>
            <tbody id="tabell-body"></tbody>
        </table>
    </div>

    <script>
    let passordFraBruker = sessionStorage.getItem('admin_passord');
    let alleData = [];

    if (!passordFraBruker) {
        passordFraBruker = prompt("Passord for sjåfør-tilgang:");
        if (passordFraBruker) sessionStorage.setItem('admin_passord', passordFraBruker);
    }

    if (passordFraBruker) {
        hentData();
    }

    async function hentData() {
        try {
            const respons = await fetch('https://miljobag-backend.onrender.com/api/bestilling', {
                headers: { 'x-auth-key': passordFraBruker }
            });
            if (!respons.ok) throw new Error("Feil");
            
            alleData = await respons.json();
            
            alleData.sort((a, b) => {
                if (a.postnummer !== b.postnummer) return a.postnummer.localeCompare(b.postnummer);
                return a.adresse.localeCompare(b.adresse);
            });

            oppdaterTabell();
        } catch (err) {
            document.getElementById('loading').innerText = "Kunne ikke laste liste.";
        }
    }

    function oppdaterTabell() {
        const tbody = document.getElementById('tabell-body');
        document.getElementById('loading').style.display = 'none';
        document.getElementById('driver-tabell').style.display = 'table';
        tbody.innerHTML = "";

        alleData.forEach(b => {
            const erHentet = b.hentet === true;
            const radStil = erHentet ? 'class="hentet-rad"' : '';
            const adresseFull = `${b.adresse}, ${b.postnummer} ${b.poststed}`;
            const kartURL = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adresseFull)}`;
            
            // Kilde-logikk
            const kildeTekst = b.fraQR ? '📱 QR' : '💻 Web';

            const rad = `
                <tr ${radStil}>
                    <td>
                        <strong>${b.firmaNavn || b.kontaktperson}</strong><br>
                        <a href="tel:${b.telefon}" class="ring-knapp">📞 Ring</a>
                    </td>
                    <td>
                        <a href="${kartURL}" target="_blank" class="kart-lenke">📍 ${b.adresse}</a><br>
                        <small>${b.postnummer} ${b.poststed}</small>
                    </td>
                    <td><strong>${b.antallSmall}S / ${b.antallMedium}M / ${b.antallLarge}L</strong></td>
                    <td>
                        <span class="kilde-tag">${kildeTekst}</span>
                        ${b.bilde ? `<button class="bilde-knapp" onclick="visBilde('${b.bilde}')">🖼️ Bilde</button>` : ''}
                        <div style="font-size: 11px; color: #666; margin-top: 5px;">${b.melding || '-'}</div>
                    </td>
                    <td>
                        <button class="status-knapp" 
                            style="background: ${erHentet ? '#6c757d' : '#ffc107'}; color: ${erHentet ? 'white' : 'black'};"
                            onclick="markerSomHentet('${b._id}')">
                            ${erHentet ? '↩️' : 'Hentet'}
                        </button>
                    </td>
                </tr>`;
            tbody.innerHTML += rad;
        });
    }

    async function markerSomHentet(id) {
        try {
            const res = await fetch(`https://miljobag-backend.onrender.com/api/bestilling/${id}/status`, {
                method: 'PATCH',
                headers: { 'x-auth-key': passordFraBruker }
            });
            if (res.ok) hentData();
        } catch (err) { alert("Feil ved oppdatering"); }
    }

    function lagKjørerute() {
        const uhentede = alleData.filter(b => !b.hentet);
        if (uhentede.length === 0) return alert("Ingen uhentede poser!");

        const stopp = uhentede.slice(0, 10);
        const destinasjon = encodeURIComponent(`${stopp[stopp.length-1].adresse}, ${stopp[stopp.length-1].postnummer}`);
        const waypoints = stopp.slice(0, -1).map(s => encodeURIComponent(`${s.adresse}, ${s.postnummer}`)).join('|');
        
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${destinasjon}&waypoints=${waypoints}&travelmode=driving`, '_blank');
    }

    function visBilde(base64Data) {
        const win = window.open("");
        win.document.write(`<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;"><img src="${base64Data}" style="max-width:100%;max-height:100vh;"></body>`);
    }
    </script>
</body>
</html>
